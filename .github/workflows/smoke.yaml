# Simply check that something works on macOS
name: smoke
on:
  push:
    branches:
      # Run tests for change on the main branch ...
      - main
    tags-ignore:
      # ... but not for tags (avoids duplicate work) ...
      - '**'
    paths:
      # ... and only if relevant files have changed.
      - stepup/**
      - pyproject.toml
      - .github/workflows/pytest.yaml
  pull_request:
    # Run tests on pull requests ...
    paths:
      # ... only if relevant files have changed.
      - stepup/**
      - pyproject.toml
      - .github/workflows/pytest.yaml

jobs:
  tests:
    strategy:
      matrix:
        python-version: ['3.11', '3.13']
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            .github/requirements-old.txt
      - name: Install oldest versions of supported dependencies
        if: ${{ matrix.python-version == '3.11'}}
        run: uv pip install --system -r .github/requirements-old.txt
      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2
      - name: Install latest commit version and matplotlib
        run: uv pip install --system -e . matplotlib
      - name: Run a simple example
        run: |
          cd docs
          STEPUP_DEBUG=1 STEPUP_SYNC_RPC_TIMEOUT=10 stepup build -j 1.0
