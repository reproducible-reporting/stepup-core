name: pytest
on:
  push:
    branches:
      # Run tests for change on the main branch ...
      - main
    tags-ignore:
      # ... but not for tags (avoids duplicate work) ...
      - '**'
    paths:
      # ... and only if relevant files have changed.
      - stepup/**
      - tests/**
      - pyproject.toml
      - .github/requirements-old.txt
      - .github/workflows/pytest.yaml
  pull_request:
    # Run tests on pull requests ...
    paths:
      # ... only if relevant files have changed.
      - stepup/**
      - tests/**
      - pyproject.toml
      - .github/requirements-old.txt
      - .github/workflows/pytest.yaml

jobs:
  tests:
    permissions:
      contents: read
    env:
      # Enforce strict checks instead of trying to repair fixable issues.
      STEPUP_DEBUG: 1
      # Duration measurements are disabled to make tests deterministic.
      STEPUP_BUILD_DURATION: 0
      # RPC timeout is set shorter to speed up tests in case of failures.
      STEPUP_SYNC_RPC_TIMEOUT: 10
    strategy:
      matrix:
        include:
          - python-version: '3.11'
            ubuntu-version: '24.04'
            dependency-path: .github/requirements-old.txt
          - python-version: '3.14'
            ubuntu-version: '26.04'
            dependency-path: pyproject.toml
    runs-on: ubuntu-${{ matrix.ubuntu-version }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ${{ matrix.dependency-path }}
      - name: Install oldest versions of supported dependencies
        if: ${{ matrix.python-version == '3.11'}}
        run: pip install -r .github/requirements-old.txt
      - name: Install latest commit version with all development dependencies
        run: pip install -e .[dev]
      - name: Run fast unit tests
        run: pytest -vv -k "not test_example"
      - name: Run integration tests with forked subprocesses
        run: STEPUP_BUILD_FORK_RUNPY=1 pytest -vv tests/test_examples.py
      - name: Run integration tests with plain subprocesses
        run: STEPUP_BUILD_FORK_RUNPY=0 pytest -vv tests/test_examples.py
